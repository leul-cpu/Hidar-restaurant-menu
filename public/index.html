<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Madiga - Digital Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Subtle paper texture overlay -->
    <div class="paper-overlay"></div>
    
    <!-- Translucent watermark -->
    <div class="watermark">MADIGA</div>

    <!-- Main Menu App Container -->
    <div id="menu-app" class="app-container">
        <!-- Hero Section -->
        <header class="hero-section">
            <div class="logo-overlay">
                <img src="/madiga_logo.png" alt="Madiga Logo Icon" class="hero-logo-icon">
            </div>
        </header>

        <!-- Sticky Navigation -->
        <nav class="sticky-nav">
            <div class="nav-scroll-container" id="nav-categories">
                <!-- Dynamic categories go here -->
            </div>
        </nav>

        <!-- Menu Content -->
        <main class="menu-main">
            <div class="search-bar-container">
                <input type="text" id="menu-search" placeholder="Search menu items..." class="menu-search-input">
            </div>

            <div id="menu-sections" class="menu-sections-container">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading Madiga Menu...</p>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>© 2026 Madiga Cafe & Restaurant. All rights reserved.</p>
            <p class="location-stamp">Addis Ababa, Ethiopia</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
